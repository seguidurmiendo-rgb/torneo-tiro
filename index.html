<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club SITAS - Torneo Anual de Tiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #d4af37;
            /* Gold */
            --primary-glow: rgba(212, 175, 55, 0.3);
            --secondary: #121212;
            --accent: #ff4d4d;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --bg-gradient: radial-gradient(circle at top right, #1a1a2e, #121212);

            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --silver: linear-gradient(135deg, #70706f, #e9e9e9, #8d8d8c, #dbdbdb, #70706f);
            --bronze: linear-gradient(135deg, #804a00, #f0a04b, #ae6a1d, #f0a04b, #804a00);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 5px var(--primary-glow);
            }

            50% {
                box-shadow: 0 0 20px var(--primary-glow);
            }

            100% {
                box-shadow: 0 0 5px var(--primary-glow);
            }
        }

        header {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.5), transparent);
        }

        header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3.5rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            background: var(--gold);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 1rem;
        }

        .brand {
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #888;
            font-size: 0.9rem;
        }

        .auth-bar {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        .btn-outline:hover {
            background: var(--primary);
            color: #000;
        }

        /* Dashboard Ranking */
        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            animation: fadeIn 0.8s ease-out forwards;
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 2rem;
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Card interactiva (la de gestión o la que antes se usaba en ranking) */
        .card-interactive {
            cursor: pointer;
        }

        .card-interactive:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Card estática (Podio) */
        .card-static {
            cursor: default;
        }

        .rank-number {
            position: absolute;
            top: -20px;
            right: 0px;
            font-size: 6rem;
            opacity: 0.05;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .card:hover .rank-number {
            opacity: 0.15;
        }

        .score-big {
            font-size: 3rem;
            font-weight: 800;
            margin: 1rem 0;
            letter-spacing: -1px;
        }

        /* Leaderboard Table */
        .ranking-table-container {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 4rem;
            overflow-x: auto;
            backdrop-filter: blur(20px);
            animation: fadeIn 0.6s ease-out forwards;
        }

        .ranking-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .ranking-table th {
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 1rem 1.5rem;
            color: #666;
            text-align: left;
        }

        .ranking-table td {
            padding: 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            font-size: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }

        .ranking-table tr:hover td {
            background: rgba(212, 175, 55, 0.08);
            color: #fff;
        }

        .ranking-table td:first-child {
            border-radius: 12px 0 0 12px;
            font-weight: 800;
            width: 80px;
            text-align: center;
            font-family: 'Orbitron';
            background: rgba(255, 255, 255, 0.03);
        }

        .ranking-table td:last-child {
            border-radius: 0 12px 12px 0;
            text-align: right;
            font-weight: 800;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.03);
        }

        /* Podium Classes for Table with Spans */
        .podium-text {
            display: inline-block;
        }

        .pos-1-text {
            background: var(--gold);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pos-2-text {
            background: var(--silver);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .pos-3-text {
            background: var(--bronze);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: #1a1a1a;
            padding: 3rem;
            border-radius: 30px;
            width: 95%;
            max-width: 700px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 90vh;
            overflow-y: auto;
            animation: fadeIn 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #aaa;
        }

        input,
        select {
            width: 100%;
            padding: 0.8rem;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
        }

        /* Impact Zones Input */
        .zones-input {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        /* Stats Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #333;
        }

        th {
            color: var(--primary);
        }

        .target-img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 1rem;
            border: 1px solid var(--glass-border);
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }

            header {
                padding: 2rem 1rem;
            }

            header img {
                height: 80px !important;
            }

            header h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 1.2rem;
                border-radius: 15px;
            }

            .score-big {
                font-size: 2rem;
            }

            .rank-number {
                font-size: 4rem;
                top: -10px;
            }

            .ranking-table th,
            .ranking-table td {
                padding: 0.8rem 0.5rem;
                font-size: 0.8rem;
            }

            .ranking-table td:first-child {
                width: 50px;
            }

            .zones-input {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">Club SITAS</div>
        <img src="club-sitas-white.png" alt="Club SITAS"
            style="height: 120px; margin: 1rem auto; display: block; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2));">
        <h1>Torneo Anual de Tiradores</h1>
    </header>

    <div class="container">
        <div class="auth-bar">
            <button class="btn btn-outline" id="btnAdmin">Panel Comisario</button>
        </div>

        <section id="rankingSection">
            <h2
                style="margin-bottom: 2rem; display: flex; align-items: center; gap: 10px; font-family: 'Orbitron'; font-size: 1.2rem; background: var(--gold); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                🏆 Podio de Honor
            </h2>
            <div id="loader" class="loader"></div>

            <div id="podiumGrid" class="ranking-grid" style="margin-bottom: 4rem;">
                <!-- Solo Top 3 -->
            </div>

            <h2 style="margin-bottom: 2rem; font-family: 'Orbitron'; font-size: 1.2rem; opacity: 0.8;">
                📊 Tabla de Posiciones
            </h2>
            <div id="rankingTableContainer" class="ranking-table-container" style="display: none;">
                <table class="ranking-table">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Tirador</th>
                            <th>Calibre</th>
                            <th style="text-align: right;">Total</th>
                        </tr>
                    </thead>
                    <tbody id="rankingTableBody">
                        <!-- Dinámico Todos -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal Detalle Tirador -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <h2 id="detNombre">Cargando...</h2>
            <p id="detDNI" style="color: #888; margin-bottom: 1.5rem;"></p>

            <div id="detHistorial">
                <!-- Tabla de puntajes mensuales -->
            </div>

            <button class="btn btn-outline" onclick="cerrarModal('modalDetalle')"
                style="margin-top: 2rem; width: 100%;">Volver</button>
        </div>
    </div>

    <!-- Modal Admin / Carga -->
    <div id="modalAdmin" class="modal">
        <div class="modal-content">
            <h2 id="adminTitle">Acceso Comisario</h2>
            <p id="adminSub" style="margin-bottom: 2rem;">Seguridad del Sistema</p>

            <div id="adminAuth">
                <div class="form-group">
                    <label>Contraseña de Seguridad</label>
                    <input type="password" id="adminPass" placeholder="Ingrese clave admin">
                </div>
                <button class="btn btn-primary" id="btnVerifyAuth" style="width: 100%;">Ingresar</button>
            </div>

            <div id="adminPanel" style="display: none;">
                <div style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
                    <button class="btn btn-outline" id="tabScore" style="flex:1">Puntaje</button>
                    <button class="btn btn-outline" id="tabShooter" style="flex:1">Nuevo</button>
                    <button class="btn btn-outline" id="tabManage" style="flex:1">Gestión</button>
                </div>

                <form id="scoreForm">
                    <div class="form-group">
                        <label>Tirador</label>
                        <select id="selectTirador" required>
                            <option value="">Seleccione Tirador...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Mes de Competencia</label>
                        <select id="selectMes" required>
                            <option value="Enero">Enero</option>
                            <option value="Febrero">Febrero</option>
                            <option value="Marzo">Marzo</option>
                            <option value="Abril">Abril</option>
                            <option value="Mayo">Mayo</option>
                            <option value="Junio">Junio</option>
                            <option value="Julio">Julio</option>
                            <option value="Agosto">Agosto</option>
                            <option value="Septiembre">Septiembre</option>
                            <option value="Octubre">Octubre</option>
                            <option value="Noviembre">Noviembre</option>
                            <option value="Diciembre">Diciembre</option>
                        </select>
                    </div>

                    <label>Zonas de Impacto (Total 10 disparos)</label>
                    <div class="zones-input">
                        <div class="form-group"><label>Z10</label><input type="number" id="z10" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z9</label><input type="number" id="z9" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z8</label><input type="number" id="z8" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z7</label><input type="number" id="z7" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z6</label><input type="number" id="z6" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z5</label><input type="number" id="z5" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z4</label><input type="number" id="z4" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z3</label><input type="number" id="z3" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z2</label><input type="number" id="z2" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z1</label><input type="number" id="z1" value="0" min="0"
                                max="10"></div>
                        <div class="form-group"><label>Z0</label><input type="number" id="z0" value="0" min="0"
                                max="10"></div>
                    </div>

                    <div class="form-group">
                        <label>Foto del Blanco (Carga automática a Drive)</label>
                        <input type="file" id="fotoFile" accept="image/*" required>
                        <small style="color: #888;">Se guardará automáticamente en tu Drive.</small>
                    </div>

                    <div id="formMsg" style="margin: 1rem 0; color: var(--accent); font-weight: bold;"></div>

                    <div style="display: flex; gap: 1rem;">
                        <button type="button" class="btn btn-outline" onclick="cerrarModal('modalAdmin')"
                            style="flex:1">Cancelar</button>
                        <button type="submit" class="btn btn-primary" style="flex:2">Guardar Puntaje</button>
                    </div>
                </form>

                <form id="shooterForm" style="display: none;">
                    <div class="form-group"><label>DNI (Obligatorio)</label><input type="text" id="newDni" required>
                    </div>
                    <div class="form-group"><label>Nombre</label><input type="text" id="newNombre" required></div>
                    <div class="form-group"><label>Apellido</label><input type="text" id="newApellido" required></div>
                    <div class="form-group"><label>Número de Socio (Opcional)</label><input type="text" id="newSocio">
                    </div>
                    <div class="form-group"><label>Email</label><input type="email" id="newEmail" required></div>
                    <div class="form-group"><label>Arma</label><input type="text" id="newArma"
                            placeholder="Ej: Glock 17"></div>
                    <div class="form-group"><label>Calibre</label><input type="text" id="newCalibre"
                            placeholder="Ej: 9mm"></div>

                    <div class="form-group">
                        <label>¿Pago Inscripción?</label>
                        <select id="newPago">
                            <option value="No">No</option>
                            <option value="Sí">Sí</option>
                        </select>
                    </div>

                    <div id="shooterMsg" style="margin: 1rem 0; color: var(--accent); font-weight: bold;"></div>

                    <div style="display: flex; gap: 1rem;">
                        <button type="button" class="btn btn-outline" onclick="cerrarModal('modalAdmin')"
                            style="flex:1">Cancelar</button>
                        <button type="submit" class="btn btn-primary" style="flex:2">Registrar Tirador</button>
                    </div>
                </form>

                <!-- Panel de Gestión -->
                <div id="managePanel" style="display: none;">
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem;">
                        <input type="text" id="searchManage" placeholder="Buscar tirador para gestionar..."
                            style="flex: 2; padding: 0.8rem; background: #2a2a2a; border: 1px solid #444; color: #fff;">
                        <button class="btn btn-outline" style="flex: 1; font-size: 0.8rem;"
                            onclick="ejecutarArregloPermisos()">🛠️ Arreglar Permisos</button>
                    </div>
                    <div id="manageList" class="grid-list" style="max-height: 400px; overflow-y: auto;">
                        <!-- Dinámico -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Modal Visor de Fotos -->
    <div id="modalFoto" class="modal">
        <div class="modal-content" style="max-width: 90%; width: auto;">
            <h2 id="fotoTitle" style="margin-bottom: 1rem;">Evidencia del Blanco</h2>
            <div id="fotoContainer"
                style="text-align: center; min-height: 200px; display: flex; align-items: center; justify-content: center; background: #222; border-radius: 8px;">
                <div id="fotoLoader" class="loader" style="display: block; margin: 0;"></div>
                <img id="imgVisor" src=""
                    style="max-width: 100%; height: auto; border-radius: 8px; border: 2px solid var(--primary); display: none;">
            </div>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button class="btn btn-outline" id="btnOpenDrive" style="flex: 1;">Abrir en Drive</button>
                <button class="btn btn-primary" onclick="cerrarModal('modalFoto')" style="flex: 1;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN: PEGAR AQUÍ EL URL DEL WEB APP DE GOOGLE APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbxS6T56FXsxUdwHOpYOSGEYS-72wvGxbczEAsk6kag-wXghjtH-jpKN6k2riTfwN07t/exec";

        let allShootData = [];
        let shootersList = [];

        async function init() {
            if (API_URL === "URL_DE_TU_SCRIPT_AQUI") {
                alert("Por favor, configura la constante API_URL con el enlace de tu Google Apps Script.");
                return;
            }
            await fetchRankings();
            await fetchShooters();
        }

        async function fetchRankings() {
            showLoader(true);
            try {
                const res = await fetch(`${API_URL}?action=getRankings`, {
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                allShootData = await res.json();
                renderRanking();
            } catch (err) {
                console.error(err);
                document.getElementById('podiumGrid').innerHTML = "<p>Error al cargar datos.</p>";
            } finally {
                showLoader(false);
            }
        }

        async function fetchShooters() {
            try {
                const res = await fetch(`${API_URL}?action=getShooters`, {
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                shootersList = await res.json();
                const select = document.getElementById('selectTirador');
                shootersList.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.DNI;
                    opt.textContent = `${s.Nombre} ${s.Apellido} (${s.DNI})`;
                    select.appendChild(opt);
                });
            } catch (err) { console.error(err); }
        }

        function renderRanking() {
            const podiumGrid = document.getElementById('podiumGrid');
            const tableBody = document.getElementById('rankingTableBody');
            const tableContainer = document.getElementById('rankingTableContainer');

            podiumGrid.innerHTML = "";
            tableBody.innerHTML = "";

            if (allShootData.length > 0) {
                tableContainer.style.display = 'block';
            }

            allShootData.forEach((item, index) => {
                const pos = index + 1;
                const posTextClass = pos === 1 ? 'pos-1-text' : pos === 2 ? 'pos-2-text' : pos === 3 ? 'pos-3-text' : '';
                const podTextClass = pos <= 3 ? posTextClass : '';
                const posCardClass = pos <= 3 ? `card-${pos}` : '';

                // 1. Renderizar Fila en Tabla (Interactiva siempre)
                const tr = document.createElement('tr');
                tr.style.cursor = "pointer";
                tr.onclick = () => verDetalle(item.DNI);
                tr.innerHTML = `
                        <td><span class="podium-text ${podTextClass}">${pos}°</span></td>
                        <td style="font-weight: 600;">${item.Nombre} ${item.Apellido}</td>
                        <td style="font-size: 0.85rem; color: #888;">${item.Arma} • ${item.Calibre}</td>
                        <td style="text-align: right;"><span class="podium-text ${podTextClass}">${item.totalScore} pts</span></td>
                    `;
                tableBody.appendChild(tr);

                // 2. Renderizar Card de Podio (Solo para Top 3, No Interactiva)
                if (pos <= 3) {
                    const div = document.createElement('div');
                    div.className = `card card-static ${posCardClass}`;
                    div.innerHTML = `
                            <div class="rank-number">${pos}</div>
                            <h3 style="font-weight: 600; font-size: 1.1rem; letter-spacing: -0.5px;">${item.Nombre} ${item.Apellido}</h3>
                            <div class="score-big ${posTextClass}" style="margin: 0.5rem 0;">${item.totalScore.toLocaleString()} <span style="font-size: 0.9rem; opacity: 0.6;">pts</span></div>

        function abrirVisor(url, mes, btnElement = null) {
            if (!url || url.includes("Error") || url === "" || url === "undefined") {
                alert("No hay foto disponible para esta entrada.");
                return;
            }

            const visor = document.getElementById('imgVisor');
            const loader = document.getElementById('fotoLoader');
            const btnDrive = document.getElementById('btnOpenDrive');
            const originalText = btnElement ? btnElement.textContent : "";

            if (btnElement) btnElement.textContent = "⏳ Cargando...";

            // Reset state
            visor.style.display = 'none';
            visor.src = "";
            loader.style.display = 'block';
            document.getElementById('fotoTitle').textContent = `Cargando Blanco - ${mes}...`;
            document.getElementById('modalFoto').style.display = 'flex';

            // Configurar botón de emergencia
            btnDrive.onclick = () => window.open(url, '_blank');

            // Identificar ID de Drive
            let fileId = "";
            if (url.includes("drive.google.com")) {
                try {
                    if (url.includes("/d/")) {
                        fileId = url.split("/d/")[1].split("/")[0];
                    } else if (url.includes("id=")) {
                        fileId = url.split("id=")[1].split("&")[0];
                    }
                } catch (e) { console.error("Error ID Drive:", e); }
            }

            // URL de miniatura (mucho más confiable para incrustar en móviles)
            let directUrl = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000` : url;

            visor.onload = () => {
                loader.style.display = 'none';
                visor.style.display = 'block';
                document.getElementById('fotoTitle').textContent = `Blanco - ${mes}`;
                if (btnElement) btnElement.textContent = originalText;
            };

            visor.onerror = () => {
                const ucUrl = fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : "";
                if (fileId && visor.src !== ucUrl) {
                    visor.src = ucUrl;
                } else if (visor.src !== url) {
                    visor.src = url;
                } else {
                    loader.style.display = 'none';
                    document.getElementById('fotoTitle').textContent = "Vista no disponible";
                    if (btnElement) btnElement.textContent = originalText;
                }
            };

            visor.src = directUrl;
        }

            msg.style.color = "var(--primary)";

                nombre: document.getElementById('newNombre').value,

                socionumero: document.getElementById('newSocio').value,

                arma: document.getElementById('newArma').value,

            };

                password: document.getElementById('adminPass').value,

                const res = await fetch(API_URL, {

                    headers: { 'Content-Type': 'text/plain;charset=utf-8' } // Necesario para evitar preflight en GAS
                });
                const result = await res.json();
                if (result.success) {
                    alert("Tirador registrado/actualizado con éxito.");
                    document.getElementById('shooterForm').reset();
                    document.getElementById('newDni').readOnly = false;

                console.error("Detalle del error:", err);
                msg.textContent = "Error de conexión. Revisa la consola (F12).";
                msg.style.color = "var(--accent)";

        document.getElementById('scoreForm').onsubmit = async (e) => {
            e.preventDefault();
            const msg = document.getElementById('formMsg');
            msg.textContent = "Procesando foto y puntaje...";
            msg.style.color = "var(--primary)";

            // Leer archivo si existe
            const fileInput = document.getElementById('fotoFile');
            let base64 = null;
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                base64 = await new Promise((resolve) => {
                    reader.onload = (ev) => resolve(ev.target.result);
                    reader.readAsDataURL(fileInput.files[0]);
                });
            }

            const scoreData = {
                dni: document.getElementById('selectTirador').value,
                mes: document.getElementById('selectMes').value,
                z10: parseInt(document.getElementById('z10').value) || 0,
                z9: parseInt(document.getElementById('z9').value) || 0,
                z8: parseInt(document.getElementById('z8').value) || 0,
                z7: parseInt(document.getElementById('z7').value) || 0,
                z6: parseInt(document.getElementById('z6').value) || 0,
                z5: parseInt(document.getElementById('z5').value) || 0,
                z4: parseInt(document.getElementById('z4').value) || 0,
                z3: parseInt(document.getElementById('z3').value) || 0,
                z2: parseInt(document.getElementById('z2').value) || 0,
                z1: parseInt(document.getElementById('z1').value) || 0,
                z0: parseInt(document.getElementById('z0').value) || 0,
                fotoBase64: base64
            };

            const payload = {
                password: document.getElementById('adminPass').value,
                action: scoreEditMode.action,
                score: scoreData
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await res.json();

                if (result.success) {
                    alert("¡Puntaje guardado/actualizado con éxito!");
                    document.getElementById('scoreForm').reset();
                    document.getElementById('fotoFile').required = true;
                    scoreEditMode = { action: 'saveScore', dni: null, mes: null };
                    document.querySelector('#scoreForm button[type="submit"]').textContent = "Guardar Puntaje";
                    await fetchRankings();
                    document.getElementById('tabManage').click();
                } else {
                    msg.textContent = "Error del Servidor: " + result.error;
                    msg.style.color = "var(--accent)";
                }
            } catch (err) {
                console.error("Detalle del error:", err);
                msg.textContent = "Error de conexión. Revisa la consola (F12).";
                msg.style.color = "var(--accent)";
            }
        };

        async function ejecutarArregloPermisos() {
            if (!confirm("¿Quieres actualizar los permisos de todas las fotos en Drive para que sean públicas? Esto puede tardar unos segundos.")) return;

            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = "⏳ Procesando...";
            btn.disabled = true;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        password: document.getElementById('adminPass').value,
                        action: 'fixPermissions'
                    }),
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const result = await res.json();
                alert(result.message || result.error);
            } catch (e) {
                alert("Error de conexión: " + e.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;

            document.getElementById('newEmail').value = s.Email || "";

            document.querySelector('#shooterForm button[type="submit"]').textContent = "Actualizar Tirador";

        async function verGestionPuntajes(dni) {

        async function prepararEdicionPuntaje(dni, mes) {

            document.getElementById('selectTirador').value = dni;
            document.getElementById('selectMes').value = mes;
            document.getElementById('z10').value = score.Z10;
            document.getElementById('z9').value = score.Z9;
            document.getElementById('z8').value = score.Z8;
            document.getElementById('z7').value = score.Z7;
            document.getElementById('z6').value = score.Z6;
            document.getElementById('z5').value = score.Z5;
            document.getElementById('z4').value = score.Z4;
            document.getElementById('z3').value = score.Z3;
            document.getElementById('z2').value = score.Z2;
            document.getElementById('z1').value = score.Z1;
            document.getElementById('z0').value = score.Z0;
            document.getElementById('fotoFile').required = false; // No obligatorio en edición

            scoreEditMode = { action: 'updateScore', dni: dni, mes: mes };

            // Actualizar UI sin disparar el .click()
            showTab('scoreForm');
            document.getElementById('tabScore').className = 'btn btn-primary';
            document.getElementById('tabShooter').className = 'btn btn-outline';
            document.getElementById('tabManage').className = 'btn btn-outline';
            document.querySelector('#scoreForm button[type="submit"]').textContent = "Actualizar Puntaje";
        }

        let scoreEditMode = { action: 'saveScore', dni: null, mes: null };

        document.getElementById('tabScore').addEventListener('click', () => {
            if (scoreEditMode.action === 'updateScore') {

            }
        });
    </script>
